spring.application.name=MikesPizza-Spring

spring.datasource.url=jdbc:mysql://localhost:3306/MikesPizza?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC

# Usuario y contraseÒa de MySQL
spring.datasource.username=root
spring.datasource.password=12345

# Driver JDBC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

server.port=8082

# Limites para subida de archivos (multipart)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB


# Dialecto de Hibernate (opcional pero recomendado)
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Para ver las consultas SQL en consola
spring.jpa.show-sql=true

# Estrategia de creaciÛn de tablas (puede ser update, create, create-drop, validate)
spring.jpa.hibernate.ddl-auto=update

